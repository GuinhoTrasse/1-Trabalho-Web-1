<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Estrutura de Títulos</title>
</head>
<body>
    <h1>Título</h1>
    <p><b>A primeira frase ou palavra que os leitorem irão ler</b></p>
    <h2>Subtítulo</h2>
    <p><i>Uma pequena explicação do que o texto se trata</i></p>
    <h3>Subsubtítulo</h3>
    <p>Subsessões do subtítulo</p>
    <h4>Subsubtítulo</h4>
    <p>Detalhes dentro do h3</p>
    <h5>Subsubsubtítulo</h5>
    <p>Detalhes mais específicos dentro do h4</p>
</body>
</html>
